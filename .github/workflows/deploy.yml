name: CI/CD Pipeline - Telco Churn ML

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: tharukaharshajith/telco-customer-churn-prediction
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Setup Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # 3. Install dependencies
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Run tests
    - name: Run tests
      run: |
        python scripts/test_fastapi.py
        python scripts/test_pipeline_phase1_data_features.py
        python scripts/test_pipeline_phase2_modeling.py

    # 5. Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 6. Build Docker image
    - name: Build Docker image
      run: |
        docker build -t $IMAGE_NAME:latest .

    # 7. Push Docker image
    - name: Push Docker image
      run: |
        docker push $IMAGE_NAME:latest

    # 8. Configure AWS credentials
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 9. Update ECS service (force new deployment)
    - name: Deploy to ECS
      run: |
        aws ecs update-service \
          --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
          --service ${{ secrets.ECS_SERVICE_NAME }} \
          --force-new-deployment